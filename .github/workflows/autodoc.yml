# .github/workflows/autodoc.yml
#
# Triggers on every push to `main`.
# 1. Detects which .py / .ts files changed in the commit.
# 2. Installs Ollama + pulls llama3 inside the runner.
# 3. Runs scripts/doc_agent.py to generate per-file reference docs.
# 4. Commits any updated docs/generated/ files back to main.
#
# [skip ci] in the commit message prevents this workflow from
# re-triggering itself after the docs commit.

name: Auto-Doc Agent

on:
  push:
    branches:
      - main
    # Only run when source files or the agent script itself change.
    paths:
      - "auth_service/**/*.py"
      - "frontend-client/**/*.ts"
      - "scripts/doc_agent.py"
      - "scripts/requirements.txt"

jobs:
  generate-docs:
    name: Generate reference docs
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout with depth 2 so git diff HEAD~1 HEAD works
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # -----------------------------------------------------------------------
      # 2. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------------------------------------------------
      # 3. Install agent dependencies
      # -----------------------------------------------------------------------
      - name: Install agent dependencies
        run: pip install -r scripts/requirements.txt

      # -----------------------------------------------------------------------
      # 4. Install Ollama
      # -----------------------------------------------------------------------
      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      # -----------------------------------------------------------------------
      # 5. Start Ollama server in the background
      # -----------------------------------------------------------------------
      - name: Start Ollama server
        run: ollama serve &

      # -----------------------------------------------------------------------
      # 6. Wait for Ollama to be ready (up to 30 s)
      # -----------------------------------------------------------------------
      - name: Wait for Ollama to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/ > /dev/null 2>&1; then
              echo "Ollama is ready after ${i}s"
              break
            fi
            sleep 1
          done

      # -----------------------------------------------------------------------
      # 7. Pull the model
      # -----------------------------------------------------------------------
      - name: Pull llama3 model
        run: ollama pull llama3

      # -----------------------------------------------------------------------
      # 8. Run the doc agent
      # -----------------------------------------------------------------------
      - name: Run doc agent
        run: python scripts/doc_agent.py
        env:
          OLLAMA_URL: "http://localhost:11434/api/generate"
          OLLAMA_MODEL: "llama3"

      # -----------------------------------------------------------------------
      # 9. Commit and push updated docs (only if something changed)
      # -----------------------------------------------------------------------
      - name: Commit updated docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/generated/
          if git diff --cached --quiet; then
            echo "No doc changes to commit."
          else
            git commit -m "docs: auto-update reference docs [skip ci]"
            git push origin main
          fi
